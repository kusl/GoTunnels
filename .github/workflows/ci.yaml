# Build and test. Deliberately thin: all logic lives in scripts/test.sh so the
# exact same commands run locally and here.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Fast, host-only checks on the bash layer: syntax, shellcheck (ships on
      # ubuntu runners), and the hermetic detect_runtime/ensure_podman_socket
      # unit tests (stubbed binaries — no containers, no sockets, no network).
      - name: Shell script checks
        run: |
          for f in scripts/*.sh scripts/tests/*.sh; do bash -n "$f"; done
          shellcheck -x -P SCRIPTDIR scripts/*.sh scripts/tests/*.sh
          bash scripts/tests/lib-detect-test.sh

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          # go.sum is intentionally absent on first import; do not fail on it.
          cache: false

      - name: Build, vet, unit tests
        run: bash scripts/test.sh all

  # Everything scripts/test.sh cannot see: that both Containerfiles build,
  # that compose wiring + env substitution is correct, that migrations run
  # against a real Postgres, and that the HTTP surface works end to end —
  # including the captcha-sync regression that only reproduces against real
  # Postgres via the pgx extended protocol, and the CSP reporting round trip
  # through the frontend's /csp-report proxy. Ubuntu runners ship podman;
  # podman-compose comes from pipx and scripts/lib.sh now PREFERS it over the
  # `podman compose` dispatcher (which on these runners would delegate to
  # docker's compose plugin against a podman socket that is not running).
  # No tunnels are started and no host ports are published; assertions run
  # from a curl container on the compose network.
  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install podman-compose
        run: pipx install podman-compose

      - name: Runtime versions
        run: |
          podman version
          podman-compose version

      - name: Build images + container smoke test
        run: bash scripts/ci-container-test.sh gotunnels-ci
